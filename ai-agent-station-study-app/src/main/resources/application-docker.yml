spring:
  application:
    name: novel-agent
  
  # MySQL数据源配置（业务数据）
  datasource:
    mysql:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${SPRING_DATASOURCE_MYSQL_URL:jdbc:mysql://mysql:3306/novel_agent?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=false}
      username: ${SPRING_DATASOURCE_MYSQL_USERNAME:root}
      password: ${SPRING_DATASOURCE_MYSQL_PASSWORD:123456}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        idle-timeout: 30000
        connection-timeout: 30000
        max-lifetime: 1800000
    
    # PostgreSQL数据源配置（向量数据库）
    pgvector:
      driver-class-name: org.postgresql.Driver
      url: ${SPRING_DATASOURCE_PGVECTOR_URL:jdbc:postgresql://postgresql:5432/novel_vector}
      username: ${SPRING_DATASOURCE_PGVECTOR_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_PGVECTOR_PASSWORD:postgres}
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
        idle-timeout: 30000
        connection-timeout: 30000
  
  # Neo4j配置（知识图谱）
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://neo4j:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:password}
  
  # AI配置（LLM API - 调用外部API，不使用本地模型）
  ai:
    openai:
      # ========== Chat API 配置（用于文本生成）==========
      api-key: ${SPRING_AI_OPENAI_API_KEY:your-api-key}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
      # 支持的API提供商：
      # - OpenAI: https://api.openai.com
      # - DeepSeek: https://api.deepseek.com
      # - Qwen: https://dashscope.aliyuncs.com/compatible-mode/v1
      # - 其他兼容OpenAI API的提供商
      
      # ========== Embeddings API 配置（用于RAG向量检索）==========
      # 使用本地Ollama服务（推荐，免费且无需API密钥）
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:nomic-embed-text}  # Ollama的embedding模型
      
      # Ollama Embeddings配置（通过环境变量配置，优先级最高）
      # 如果环境变量未设置，使用配置文件中的默认值
      embedding-api-key: ${EMBEDDING_API_KEY:ollama}  # Ollama不需要真实的key
      embedding-base-url: ${EMBEDDING_BASE_URL:http://ollama:11434/v1}  # 使用docker服务名
  
  # MyBatis配置
  mybatis:
    mapper-locations: classpath:/mybatis/mapper/**/*.xml
    config-location: classpath:/mybatis/config/mybatis-config.xml

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 日志配置
logging:
  level:
    cn.bugstack.novel: DEBUG
    org.springframework.ai: INFO
    root: INFO
  file:
    name: /app/logs/novel-agent.log
