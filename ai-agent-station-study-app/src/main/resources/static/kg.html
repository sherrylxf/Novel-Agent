<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>知识图谱 - Novel Agent</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; margin: 0; background: #1a1b26; color: #c0caf5; }
    .top { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #16161e; border-bottom: 1px solid #363b54; }
    .top h1 { margin: 0; font-size: 1.25rem; }
    .top a { color: #7aa2f7; text-decoration: none; }
    .top a:hover { text-decoration: underline; }
    .filter { display: flex; align-items: center; gap: 8px; }
    .filter input { padding: 6px 10px; border: 1px solid #363b54; border-radius: 6px; background: #24283b; color: #c0caf5; width: 200px; }
    .filter button { padding: 6px 14px; border: none; border-radius: 6px; background: #7aa2f7; color: #1a1b26; cursor: pointer; font-weight: 600; }
    .filter button:hover { background: #89b4fa; }
    .layout { display: flex; height: calc(100vh - 52px); }
    #cy { flex: 1; min-width: 0; }
    .side { width: 320px; background: #16161e; border-left: 1px solid #363b54; overflow: auto; padding: 12px; }
    .side h3 { margin: 0 0 8px 0; font-size: 0.95rem; color: #7aa2f7; }
    .side ul { list-style: none; padding: 0; margin: 0 0 16px 0; }
    .side li { padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; background: #24283b; font-size: 0.85rem; cursor: pointer; }
    .side li:hover { background: #363b54; }
    .side li .type { color: #9ece6a; margin-right: 6px; }
    .side .detail { font-size: 0.8rem; color: #a9b1d6; margin-top: 8px; padding: 8px; background: #24283b; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
    .side .actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .side .actions button { padding: 4px 10px; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; background: #414868; color: #c0caf5; }
    .side .actions button.del { background: #f7768e; color: #1a1b26; }
    .side .actions button:hover { opacity: 0.9; }
    .empty { color: #565f89; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="top">
    <h1>知识图谱</h1>
    <a href="rag.html">RAG 文档库</a>
    <div class="filter">
      <label>小说ID</label>
      <input type="text" id="novelId" placeholder="可选，留空查全部" />
      <button id="btnLoad">加载图谱</button>
    </div>
  </div>
  <div class="layout">
    <div id="cy"></div>
    <div class="side">
      <h3>节点列表 · 点击节点看详情</h3>
      <ul id="nodeList"></ul>
      <div id="nodeDetail" class="detail" style="display:none;"></div>
      <div id="nodeActions" class="actions" style="display:none;"></div>
    </div>
  </div>
  <script>
    const API = '';
    let cy = null;
    let graphData = { nodes: [], edges: [] };
    let selectedNodeId = null;

    function loadGraph() {
      const novelId = (document.getElementById('novelId').value || '').trim();
      fetch(API + '/api/kg/graph?novelId=' + encodeURIComponent(novelId))
        .then(r => r.json())
        .then(res => {
          if (!res.success) throw new Error(res.message || '加载失败');
          graphData = { nodes: res.nodes || [], edges: res.edges || [] };
          renderCy();
          renderNodeList();
        })
        .catch(e => {
          console.error(e);
          alert('加载失败: ' + (e.message || e));
        });
    }

    function renderCy() {
      const elements = [];
      graphData.nodes.forEach(n => {
        elements.push({ data: { id: n.id, label: n.label || n.id, type: n.type } });
      });
      graphData.edges.forEach(e => {
        elements.push({ data: { id: e.id, source: e.source, target: e.target, label: e.type || '' } });
      });
      if (cy) cy.destroy();
      cy = cytoscape({
        container: document.getElementById('cy'),
        elements,
        style: [
          { selector: 'node', style: { 'label': 'data(label)', 'text-valign': 'bottom', 'text-margin-y': 4, 'font-size': '10px', 'color': '#c0caf5',
            'background-color': (ele) => ele.data('type') === 'Foreshadowing' ? '#bb9af7' : '#7aa2f7',
            'width': 28, 'height': 28 } },
          { selector: 'edge', style: { 'width': 1.5, 'line-color': '#414868', 'target-arrow-color': '#414868', 'curve-style': 'bezier', 'target-arrow-shape': 'triangle' } }
        ],
        layout: { name: 'cose', animate: false }
      });
      cy.on('tap', 'node', evt => {
        selectedNodeId = evt.target.id();
        showNodeDetail(selectedNodeId);
      });
    }

    function renderNodeList() {
      const ul = document.getElementById('nodeList');
      ul.innerHTML = '';
      if (!graphData.nodes.length) {
        ul.innerHTML = '<li class="empty">暂无节点，请先输入小说ID加载或留空查看全部</li>';
        return;
      }
      graphData.nodes.forEach(n => {
        const li = document.createElement('li');
        li.innerHTML = '<span class="type">[' + (n.type || '') + ']</span>' + (n.label || n.id);
        li.onclick = () => { selectedNodeId = n.id; showNodeDetail(n.id); };
        ul.appendChild(li);
      });
    }

    function showNodeDetail(id) {
      const node = graphData.nodes.find(n => n.id === id);
      const detailEl = document.getElementById('nodeDetail');
      const actionsEl = document.getElementById('nodeActions');
      if (!node) {
        detailEl.style.display = 'none';
        actionsEl.style.display = 'none';
        return;
      }
      detailEl.style.display = 'block';
      detailEl.textContent = JSON.stringify(node.properties || {}, null, 2);
      actionsEl.style.display = 'block';
      actionsEl.innerHTML = '';
      const delBtn = document.createElement('button');
      delBtn.className = 'del';
      delBtn.textContent = '删除';
      delBtn.onclick = () => deleteNode(node);
      actionsEl.appendChild(delBtn);
    }

    function deleteNode(node) {
      if (!confirm('确定删除该节点？')) return;
      const isChar = (node.type === 'Character');
      const url = isChar ? '/api/kg/character?characterId=' + encodeURIComponent(node.id) : '/api/kg/foreshadowing?foreshadowingId=' + encodeURIComponent(node.id);
      fetch(API + url, { method: 'DELETE' })
        .then(r => r.json())
        .then(res => {
          if (res.success) loadGraph();
          else alert(res.message || '删除失败');
        })
        .catch(e => alert('删除失败: ' + e.message));
    }

    document.getElementById('btnLoad').addEventListener('click', loadGraph);
    loadGraph();
  </script>
</body>
</html>
