<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAG 文档库 - Novel Agent</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; margin: 0; background: #1a1b26; color: #c0caf5; }
    .top { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #16161e; border-bottom: 1px solid #363b54; flex-wrap: wrap; }
    .top h1 { margin: 0; font-size: 1.25rem; }
    .top a { color: #7aa2f7; text-decoration: none; }
    .top a:hover { text-decoration: underline; }
    .filter { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter input, .filter select { padding: 6px 10px; border: 1px solid #363b54; border-radius: 6px; background: #24283b; color: #c0caf5; }
    .filter input { width: 160px; }
    .filter button { padding: 6px 14px; border: none; border-radius: 6px; background: #7aa2f7; color: #1a1b26; cursor: pointer; font-weight: 600; }
    .filter button:hover { background: #89b4fa; }
    .main { padding: 16px; max-width: 1400px; margin: 0 auto; }
    .search-box { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
    .search-box input { flex: 1; max-width: 400px; padding: 8px 12px; border: 1px solid #363b54; border-radius: 6px; background: #24283b; color: #c0caf5; }
    .search-box button { padding: 8px 16px; border: none; border-radius: 6px; background: #9ece6a; color: #1a1b26; cursor: pointer; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #363b54; }
    th { background: #24283b; color: #7aa2f7; }
    tr:hover { background: #24283b; }
    .content-cell { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score { color: #9ece6a; }
    .del-btn { padding: 4px 10px; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; background: #f7768e; color: #1a1b26; }
    .del-btn:hover { opacity: 0.9; }
    .result-block { margin-top: 16px; padding: 12px; background: #16161e; border-radius: 8px; border: 1px solid #363b54; }
    .result-block h3 { margin: 0 0 8px 0; color: #9ece6a; font-size: 1rem; }
    .result-item { padding: 8px 0; border-bottom: 1px solid #363b54; font-size: 0.9rem; }
    .result-item:last-child { border-bottom: none; }
    .empty { color: #565f89; }
  </style>
</head>
<body>
  <div class="top">
    <h1>RAG 文档库</h1>
    <a href="kg.html">知识图谱</a>
    <div class="filter">
      <label>小说ID</label>
      <input type="text" id="novelId" placeholder="可选" />
      <label>章节ID</label>
      <input type="text" id="chapterId" placeholder="可选" />
      <button id="btnLoad">查询文档</button>
    </div>
  </div>
  <div class="main">
    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="输入关键词进行语义检索（可配合小说ID过滤）" />
      <button id="btnSearch">检索</button>
    </div>
    <div class="result-block" id="searchResult" style="display:none;">
      <h3>检索结果</h3>
      <div id="searchResultList"></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>小说/卷/章</th>
          <th>场景</th>
          <th>内容摘要</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="docList"></tbody>
    </table>
    <p id="totalLine" class="empty"></p>
  </div>
  <script>
    const API = '';
    let currentPage = 1;
    const pageSize = 20;

    function loadDocuments() {
      const novelId = (document.getElementById('novelId').value || '').trim();
      const chapterId = (document.getElementById('chapterId').value || '').trim();
      const params = new URLSearchParams({ page: currentPage, size: pageSize });
      if (novelId) params.set('novelId', novelId);
      if (chapterId) params.set('chapterId', chapterId);
      fetch(API + '/api/rag/documents?' + params)
        .then(r => r.json())
        .then(res => {
          if (!res.success) throw new Error(res.message || '查询失败');
          renderDocTable(res.data || [], res.total || 0);
        })
        .catch(e => {
          console.error(e);
          document.getElementById('docList').innerHTML = '<tr><td colspan="5" class="empty">加载失败: ' + (e.message || e) + '</td></tr>';
        });
    }

    function renderDocTable(data, total) {
      const tbody = document.getElementById('docList');
      document.getElementById('totalLine').textContent = '共 ' + total + ' 条';
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无文档</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(d => {
        const meta = d.metadata || {};
        const novel = meta.novelId || '-';
        const vol = meta.volumeNumber != null ? '卷' + meta.volumeNumber : '';
        const ch = meta.chapterNumber != null ? '章' + meta.chapterNumber : (meta.chapterTitle || '');
        const scene = (meta.sceneTitle || meta.sceneNumber || '-');
        const summary = (d.contentSummary || '').substring(0, 120);
        return '<tr>' +
          '<td>' + (d.id || '-').substring(0, 8) + '…</td>' +
          '<td>' + novel + ' ' + vol + ' ' + ch + '</td>' +
          '<td>' + scene + '</td>' +
          '<td class="content-cell" title="' + (d.contentSummary || '').replace(/"/g, '&quot;') + '">' + summary + '</td>' +
          '<td><button class="del-btn" data-id="' + (d.id || '') + '">删除</button></td></tr>';
      }).join('');
      tbody.querySelectorAll('.del-btn').forEach(btn => {
        btn.onclick = () => deleteDoc(btn.dataset.id);
      });
    }

    function deleteDoc(id) {
      if (!confirm('确定删除该文档？')) return;
      fetch(API + '/api/rag/document?id=' + encodeURIComponent(id), { method: 'DELETE' })
        .then(r => r.json())
        .then(res => {
          if (res.success) loadDocuments();
          else alert(res.message || '删除失败');
        })
        .catch(e => alert('删除失败: ' + e.message));
    }

    function doSearch() {
      const q = (document.getElementById('searchQuery').value || '').trim();
      if (!q) { alert('请输入检索词'); return; }
      const novelId = (document.getElementById('novelId').value || '').trim();
      const params = new URLSearchParams({ q, topK: 10 });
      if (novelId) params.set('novelId', novelId);
      fetch(API + '/api/rag/search?' + params)
        .then(r => r.json())
        .then(res => {
          const block = document.getElementById('searchResult');
          const listEl = document.getElementById('searchResultList');
          block.style.display = 'block';
          if (!res.success) {
            listEl.innerHTML = '<div class="empty">检索失败: ' + (res.message || '') + '</div>';
            return;
          }
          const list = res.data || [];
          if (!list.length) {
            listEl.innerHTML = '<div class="empty">无命中结果</div>';
            return;
          }
          listEl.innerHTML = list.map((item, i) => {
            const score = item.score != null ? (item.score * 100).toFixed(1) + '%' : '-';
            const meta = item.metadata || {};
            const from = (meta.novelId || '') + ' ' + (meta.chapterTitle || '') + ' ' + (meta.sceneTitle || '');
            return '<div class="result-item">' +
              '<strong>[' + (i + 1) + '] 相似度: <span class="score">' + score + '</span></strong> ' + (from ? '来自: ' + from : '') + '<br/>' +
              (item.content || '').substring(0, 300) + (item.content && item.content.length > 300 ? '…' : '') +
              '</div>';
          }).join('');
        })
        .catch(e => {
          document.getElementById('searchResult').style.display = 'block';
          document.getElementById('searchResultList').innerHTML = '<div class="empty">检索失败: ' + (e.message || e) + '</div>';
        });
    }

    document.getElementById('btnLoad').addEventListener('click', () => { currentPage = 1; loadDocuments(); });
    document.getElementById('btnSearch').addEventListener('click', doSearch);
    loadDocuments();
  </script>
</body>
</html>
