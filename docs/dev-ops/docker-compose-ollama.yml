# Ollama本地Embedding模型服务配置
# 
# 使用方式：
# 1. 如果其他容器已经运行，只需要启动Ollama：
#    docker compose -p novel-dev -f docker-compose-ollama.yml up -d
#
# 2. 网络会自动处理：
#    - 如果网络已存在（其他容器已运行），会自动使用
#    - 如果网络不存在，会自动创建
#
# 3. 首次启动后，需要拉取embedding模型：
#    docker exec -it novel-dev-ollama ollama pull nomic-embed-text
#
# 4. 验证模型是否可用：
#    docker exec -it novel-dev-ollama ollama list
#
# 注意：
# - 此配置使用与主docker-compose.yml相同的网络名称，确保容器间可以通信
# - Ollama模型数据会持久化到ollama_data卷中
# - 端口11434映射到主机，方便外部访问和调试

services:
  # Ollama（本地Embedding模型服务）
  # 使用阿里云镜像（国内访问更快）
  ollama:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/ollama:0.5.10
    container_name: novel-dev-ollama
    restart: always
    ports:
      - "11434:11434"  # Ollama API端口
    volumes:
      - ollama_data:/root/.ollama  # 持久化模型数据
    environment:
      - TZ=Asia/Shanghai
    # 注意：首次启动需要手动拉取模型，执行：
    # docker exec -it novel-dev-ollama ollama pull nomic-embed-text
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:  # Ollama模型数据持久化

networks:
  novel-network:
    name: novel-dev_novel-network  # 使用与主配置相同的网络名称
    driver: bridge
    # 注意：如果网络已存在，docker compose会自动使用现有网络
    # 如果网络不存在，会自动创建
