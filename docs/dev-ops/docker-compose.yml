# Novel Agent 完整Docker Compose配置（包含应用服务）
# 
# 使用方式：
# 1. 只启动数据库服务（推荐，不需要打包项目）：
#    docker compose -p novel-dev -f docker-compose-environment.yml up -d
#    或使用阿里云镜像：docker compose -p novel-dev -f docker-compose-environment-aliyun.yml up -d
#
# 2. 启动所有服务（包括应用，需要先构建镜像）：
#    docker compose -p novel-dev up -d
#    注意：启动应用前需要先构建镜像：
#    docker build -t novel-agent:1.0-SNAPSHOT -f ai-agent-station-study-app/Dockerfile ai-agent-station-study-app/
# 
# 包含所有服务：
# - MySQL（业务数据库）
# - PostgreSQL（向量数据库）
# - Neo4j（知识图谱）
# - Novel Agent应用（可选，需要先构建镜像）
# - 管理工具（phpMyAdmin、pgAdmin）
#
# 注意：
# 1. 使用 docker compose（V2，不带横线）
# 2. 项目名称：novel-dev（所有服务都在此项目下）
# 3. 网络名称：novel-dev_novel-network（自动创建）

services:
  # ==================== 数据库服务 ====================
  
  # MySQL数据库（业务数据）
  mysql:
    image: mysql:8.0.32
    container_name: novel-dev-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL + pgvector（向量数据库，RAG）
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: novel-dev-postgresql
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novel_vector
      PGPASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./pgvector/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novel_vector"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Neo4j（知识图谱）
  neo4j:
    image: neo4j:5.15.0
    container_name: novel-dev-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # 允许外部访问
      NEO4J_dbms_connector_http_listen__address: 0.0.0.0:7474
      NEO4J_dbms_connector_bolt_listen__address: 0.0.0.0:7687
    ports:
      - "17474:7474"  # HTTP
      - "17687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 应用服务 ====================
  
  # Novel Agent应用
  novel-agent-app:
    image: novel-agent:1.0-SNAPSHOT
    container_name: novel-dev-app
    restart: on-failure
    ports:
      - "8091:8091"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=docker
      # MySQL连接（使用docker-compose服务名）
      - SPRING_DATASOURCE_MYSQL_URL=jdbc:mysql://mysql:3306/novel_agent?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=false
      - SPRING_DATASOURCE_MYSQL_USERNAME=root
      - SPRING_DATASOURCE_MYSQL_PASSWORD=123456
      # PostgreSQL连接（使用docker-compose服务名）
      - SPRING_DATASOURCE_PGVECTOR_URL=jdbc:postgresql://postgresql:5432/novel_vector
      - SPRING_DATASOURCE_PGVECTOR_USERNAME=postgres
      - SPRING_DATASOURCE_PGVECTOR_PASSWORD=postgres
      # Neo4j连接（使用docker-compose服务名）
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=password
      # LLM API配置（通过环境变量传入，避免泄露）
      - SPRING_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPRING_AI_OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - novel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8091/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 管理工具 ====================
  
  # phpMyAdmin（MySQL管理工具）
  phpmyadmin:
    image: phpmyadmin:5.2.1
    hostname: phpmyadmin
    container_name: novel-dev-phpmyadmin
    restart: always
    ports:
      - "8899:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - novel-network

  # pgAdmin（PostgreSQL管理工具）
  pgadmin:
    image: dpage/pgadmin4:9.1.0
    hostname: pgadmin
    container_name: novel-dev-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@novel.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - novel-network

volumes:
  mysql_data:
  postgresql_data:
  neo4j_data:
  neo4j_logs:

networks:
  novel-network:
    driver: bridge
