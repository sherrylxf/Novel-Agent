# Novel Agent 数据库环境配置（阿里云镜像版）
# 使用方式：docker compose -p novel-dev -f docker-compose-environment-aliyun.yml up -d
# 
# 包含服务：
# - MySQL（业务数据库）
# - PostgreSQL + pgvector（向量数据库）
# - Neo4j（知识图谱）
# - 管理工具（phpMyAdmin、pgAdmin）
#
# 注意：此配置使用阿里云镜像仓库，国内访问速度更快
# Neo4j、PostgreSQL使用标准镜像（阿里云仓库中无此镜像或拉取超时）

services:
  # ==================== 数据库服务 ====================
  
  # MySQL数据库（业务数据）
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/mysql:8.0.32
    container_name: novel-dev-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL（向量数据库，RAG）
  # 使用pgvector专用镜像，已内置pgvector扩展
  postgresql:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/pgvector:pg17
    container_name: novel-dev-postgresql
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novel_vector
      PGPASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./pgvector/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novel_vector"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Neo4j（知识图谱）
  # 注意：使用标准镜像，阿里云仓库中无此镜像
  neo4j:
    image: neo4j:5.15.0
    container_name: novel-dev-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # 允许外部访问
      NEO4J_dbms_connector_http_listen__address: 0.0.0.0:7474
      NEO4J_dbms_connector_bolt_listen__address: 0.0.0.0:7687
    ports:
      - "17474:7474"  # HTTP
      - "17687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - novel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 管理工具 ====================
  
  # phpMyAdmin（MySQL管理工具）
  phpmyadmin:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/phpmyadmin:5.2.1
    container_name: novel-dev-phpmyadmin
    hostname: phpmyadmin
    restart: always
    ports:
      - "8899:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - novel-network

  # pgAdmin（PostgreSQL管理工具）
  pgadmin:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/pgadmin4:9.1.0
    container_name: novel-dev-pgadmin
    hostname: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@novel.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - novel-network

volumes:
  mysql_data:
  postgresql_data:
  neo4j_data:
  neo4j_logs:

networks:
  novel-network:
    driver: bridge
